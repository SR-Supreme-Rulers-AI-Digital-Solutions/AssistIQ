<!DOCTYPE html>
<html>
<head>
  <title>AssistIQ - Smart AI Support</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    AssistIQ 🤖  
    <div class="sub">Smart Customer Support AI</div>
  </div>

  <div id="chatbox" class="chatbox"></div>

  <div class="quick-buttons">
    <button onclick="quickMsg('pricing')">💰 Pricing</button>
    <button onclick="quickMsg('order')">📦 Track Order</button>
    <button onclick="quickMsg('contact')">📞 Contact</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button onclick="startVoice()">🎤</button>
    <button onclick="sendMessage()">➤</button>
  </div>

  <div class="footer">
    ⚡ Demo version — Contact us to build your custom chatbot 🚀
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
